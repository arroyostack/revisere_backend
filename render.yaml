# =============================================================================
# Render Blueprint Configuration
# =============================================================================
# Purpose: Define the ContractLens Backend service for Render deployment.
# Documentation: https://render.com/docs/blueprint-spec
#
# This file enables:
# - Automatic deployments when main branch is pushed
# - Zero-config infrastructure setup
# - Health checks and auto-scaling
# =============================================================================

# =============================================================================
# Service Definition
# =============================================================================
services:
  - type: web
    name: contractlens-backend
    runtime: docker
    region: oregon  # Closest to US users, can change to frankfurt, ohio, singapore, etc.

    # =============================================================================
    # Docker Configuration
    # =============================================================================
    # Uses Dockerfile in repository root
    dockerfilePath: ./Dockerfile

    # =============================================================================
    # Health Check
    # =============================================================================
    # Render will monitor this endpoint
    healthCheckPath: /health

    # =============================================================================
    # Scaling Configuration
    # =============================================================================
    # Free tier: 1 instance, sleeps after 15 min of inactivity
    # Paid tiers: auto-scales based on traffic
    numInstances: 1
    scaling:
      minInstances: 1
      maxInstances: 3
      targetMemoryPercent: 70
      targetCPUPercent: 70

    # =============================================================================
    # Environment Variables
    # =============================================================================
    # Non-sensitive defaults (can be overridden in Render dashboard)
    envVars:
      # Application Configuration
      - key: PORT
        value: "3000"
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info

      # Rate Limiting (adjust based on your Render plan)
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "100"
      - key: RATE_LIMIT_WINDOW_SECONDS
        value: "60"

      # AI Budget Protection
      - key: AI_DAILY_CALL_BUDGET
        value: "500"
      - key: AI_PER_IP_DAILY_LIMIT
        value: "10"

      # =============================================================================
      # REQUIRED: AI Provider Configuration (Set in Render Dashboard as Secrets)
      # =============================================================================
      # Create these as "Secret" environment variables in Render Dashboard:
      # - key: AI_PROVIDER
      #   sync: false  # Will be set in dashboard
      # - key: AI_API_KEY
      #   sync: false  # Will be set in dashboard
      # - key: AI_MODEL_IDENTIFIER
      #   sync: false  # Will be set in dashboard

      # Frontend Origin (update this to your deployed frontend URL)
      - key: FRONTEND_ORIGIN
        fromDatabase:
          # Leave empty, set actual frontend URL after deployment
          value: https://your-frontend-url.com

# =============================================================================
# Notes for Deployment:
# =============================================================================
# 
# 1. Connect GitHub Repository
#    - Go to https://dashboard.render.com/blueprints
#    - Click "New Blueprint Instance"
#    - Connect your GitHub account
#    - Select "revisere_backend" repository
#    - Render will detect render.yaml automatically
#
# 2. Set Environment Variables in Render Dashboard
#    After connecting, go to your service → Environment tab and set:
#    - AI_PROVIDER (openai, anthropic, groq, google, or minimax)
#    - AI_API_KEY (your AI provider API key)
#    - AI_MODEL_IDENTIFIER (e.g., gpt-4o, claude-3-5-sonnet-20241002)
#    - FRONTEND_ORIGIN (your deployed frontend URL)
#
# 3. Automatic Deployments
#    Every push to main branch will automatically trigger a new deployment.
#
# 4. Custom Domain (Optional)
#    Add custom domain in Render Dashboard → Settings → Custom Domains
